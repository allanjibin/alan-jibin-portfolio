<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About. | Alan Jibin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { black: '#0f0f0f', white: '#fcfcfc', },
                    boxShadow: { 'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.5)', }
                }
            }
        }
    </script>
    <style>
        body, a, button {
            cursor: none !important; 
            background-color: #0f0f0f;
            color: #fcfcfc;
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        .hover-underline:hover { text-decoration: underline; text-underline-offset: 4px; }
        
        .dotted-text {
            color: transparent;
            background-image: radial-gradient(circle, #4b5563 35%, transparent 40%);
            background-size: 14px 14px; 
            -webkit-background-clip: text;
            background-clip: text;
        }

        #preloader { transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out; }
        .hide-preloader { opacity: 0; visibility: hidden; }
        .loader-line { width: 0%; animation: fillLine 1.5s ease-in-out infinite alternate; }
        @keyframes fillLine { 0% { width: 0%; } 100% { width: 100%; } }

        .reveal-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-up.active { opacity: 1; transform: translateY(0); }
        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }

        .cursor-dot {
            width: 8px; height: 8px;
            background-color: white;
            position: fixed; top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 99999;
            pointer-events: none;
        }
        .cursor-outline {
            width: 40px; height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: fixed; top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 99998;
            pointer-events: none;
            transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.2s;
        }

        .meteor-trail {
            pointer-events: none;
            position: fixed;
            width: 6px;
            height: 6px;
            background-color: #8b9aff;
            border-radius: 50%;
            box-shadow: 0 0 10px #8b9aff, 0 0 20px #8b9aff;
            z-index: 99997;
            animation: meteorFade 0.6s ease-out forwards;
        }

        @keyframes meteorFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, 20px) scale(0); }
        }

        @media (max-width: 768px) {
            .cursor-dot, .cursor-outline, .meteor-trail { display: none !important; }
            body, a, button { cursor: auto !important; }
        }
    </style>
</head>
<body class="antialiased font-sans selection:bg-white selection:text-black flex flex-col min-h-screen">

    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <div id="preloader" class="fixed inset-0 z-[100] bg-[#0f0f0f] flex flex-col items-center justify-center cursor-none">
        <h2 class="dotted-text text-4xl md:text-5xl font-black tracking-tighter lowercase mb-6 animate-pulse">updating.</h2>
        <div class="w-48 h-1 bg-white/10 rounded-full overflow-hidden">
            <div class="h-full bg-[#8b9aff] loader-line rounded-full"></div>
        </div>
    </div>

    <div class="w-full flex-grow flex flex-col">

        <nav class="reveal-up flex justify-between items-center px-6 py-8 md:px-12 border-b border-white/20 bg-[#0f0f0f] relative z-50">
            <a href="index.html" class="text-xl font-bold tracking-tight text-white hover:text-[#8b9aff] transition-colors cursor-hover-target">Alan Jibin.</a>
            <div class="hidden md:flex space-x-8 text-sm font-medium text-white">
                <a href="index.html" class="hover-underline text-gray-400 hover:text-white cursor-hover-target">Home.</a>
                <a href="projects.html" class="hover-underline text-gray-400 hover:text-white cursor-hover-target">Projects.</a>
                <a href="about.html" class="font-bold border-b-2 border-[#8b9aff] pb-1 cursor-hover-target">About.</a>
                <a href="blog.html" class="hover-underline text-gray-400 hover:text-white cursor-hover-target">Blog.</a>
            </div>
            <a href="#" class="md:hidden text-sm font-medium hover-underline text-white cursor-hover-target">Menu.</a>
        </nav>

        <main class="relative w-full flex-grow bg-[#0f0f0f] overflow-hidden flex flex-col items-center justify-center border-b border-white/20">
            
            <div class="absolute inset-0 z-0 flex items-center justify-center pointer-events-none opacity-20">
                <h1 class="dotted-text text-[40vw] md:text-[30vw] leading-none font-black tracking-tighter lowercase">
                    404
                </h1>
            </div>
            
            <div class="relative z-10 reveal-up delay-100 flex flex-col items-center text-center px-6 py-20">
                <div class="w-16 h-1 bg-[#8b9aff] mb-8 rounded-full"></div>
                <h1 class="text-5xl md:text-7xl font-black tracking-tighter leading-tight mb-6 text-white">Under Maintenance.</h1>
                <p class="text-xl md:text-2xl text-gray-400 max-w-2xl mx-auto leading-relaxed mb-12">
                    I'm currently writing my bio and setting up this section. Check back soon to learn more about my journey!
                </p>
                <a href="index.html" class="bg-white/5 backdrop-blur-md text-white border border-white/20 hover:bg-[#8b9aff] hover:border-[#8b9aff] hover:text-black px-8 py-4 rounded-full font-bold tracking-tight transition-all duration-300 cursor-hover-target shadow-glass group">
                    <span class="group-hover:-translate-x-1 inline-block transition-transform">&larr;</span> Return to Homepage
                </a>
            </div>

        </main>

        <footer class="py-12 text-center text-sm text-gray-400 bg-[#0f0f0f]">
            <p>Copyright 2026. Alan Jibin. All rights reserved.</p>
        </footer>

    </div>

    <script>
        // Handle Custom Cursor & Meteor Trail
        const cursorDot = document.querySelector("[data-cursor-dot]");
        const cursorOutline = document.querySelector("[data-cursor-outline]");
        const hoverTargets = document.querySelectorAll("a, .cursor-hover-target");

        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener("mousemove", function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;

            cursorDot.style.left = `${mouseX}px`;
            cursorDot.style.top = `${mouseY}px`;

            cursorOutline.animate({
                left: `${mouseX}px`,
                top: `${mouseY}px`
            }, { duration: 500, fill: "forwards" });

            const spark = document.createElement("div");
            spark.className = "meteor-trail";
            spark.style.left = `${mouseX}px`;
            spark.style.top = `${mouseY}px`;
            document.body.appendChild(spark);

            setTimeout(() => {
                spark.remove();
            }, 600);
        });

        hoverTargets.forEach(target => {
            target.addEventListener("mouseenter", () => {
                cursorOutline.style.width = "60px";
                cursorOutline.style.height = "60px";
                cursorOutline.style.backgroundColor = "rgba(139, 154, 255, 0.2)";
                cursorOutline.style.borderColor = "#8b9aff";
            });
            target.addEventListener("mouseleave", () => {
                cursorOutline.style.width = "40px";
                cursorOutline.style.height = "40px";
                cursorOutline.style.backgroundColor = "transparent";
                cursorOutline.style.borderColor = "rgba(255, 255, 255, 0.5)";
            });
        });

        // Handle the Loader and Initial Reveal
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('preloader').classList.add('hide-preloader');
                setTimeout(() => {
                    const heroElements = document.querySelectorAll('.reveal-up');
                    heroElements.forEach(el => el.classList.add('active'));
                }, 200); 
            }, 600);
        });
    </script>

</body>
</html>
